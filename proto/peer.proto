syntax = "proto3";

package quorum.v1;

option go_package = "github.com/adityasingh/quorum/proto;quorumpb";

// Peer is the node-to-node channel between cluster members.
//
// Phase 0: only Ping exists, so the transport abstraction and its in-memory
// fault-injection switch (partition / drop / delay) can be built and tested
// before any consensus code depends on them.
//
// Phase 1 adds the Raft RPCs here: RequestVote, AppendEntries.
// Phase 2 adds InstallSnapshot.
service Peer {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
}

message PingRequest {
  // ID of the node sending the ping.
  string from = 1;
  int64 nonce = 2;
}

message PingResponse {
  // ID of the node answering the ping.
  string from = 1;
  int64 nonce = 2;
}

// LogEntry is a single replicated command in the Raft log. The command is an
// opaque blob; the Raft core never interprets it (the KV state machine does).
message LogEntry {
  uint64 term = 1;
  bytes command = 2;
}

// RequestVote (Raft §5.2): a candidate solicits a vote.
message RequestVoteRequest {
  uint64 term = 1;
  string candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

// AppendEntries (Raft §5.3): leader replicates entries / sends heartbeats.
message AppendEntriesRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  // Fast-backup hint: first index of the conflicting term (or follower's log
  // length when it's too short), so the leader can skip whole terms instead of
  // decrementing nextIndex one entry at a time.
  uint64 conflict_index = 3;
  uint64 conflict_term = 4;
}
