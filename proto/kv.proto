syntax = "proto3";

package quorum.v1;

option go_package = "github.com/adityasingh/quorum/proto;quorumpb";

// KV is the external, client-facing key-value API.
// Phase 0: backed by a plain in-memory map on a single node.
// Phase 3: writes become Raft commands; reads use ReadIndex.
service KV {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message PutRequest {
  string key = 1;
  string value = 2;
}

message PutResponse {}

message GetRequest {
  string key = 1;
}

message GetResponse {
  string value = 1;
  bool found = 2;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  // Whether a value existed and was removed.
  bool existed = 1;
}
